render_digest:
  name: Render weekly digest
  description: Refresh the selected library feeds and return an age-aware email payload with source-coverage metadata.
  fields:
    force_refresh:
      name: Refresh first
      description: Load the current official branch feeds before generating the email.
      required: false
      default: true
      selector:
        boolean:
    embed_images:
      name: Embed event images
      description: Download selected event images for inline SMTP display and return their temporary local paths. Files are deleted automatically after one hour.
      required: false
      default: false
      selector:
        boolean:
